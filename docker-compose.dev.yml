services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wikigdd
      POSTGRES_PASSWORD: wikigdd_dev
      POSTGRES_DB: wikigdd
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikigdd"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata_dev:
